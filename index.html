<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黑暗地城 - D&D 暗影</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #8b0000;
            --ui-bg: rgba(20, 20, 20, 0.8);
            --text-color: #e0e0e0;
            --gold-color: #ffd700;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            max-height: 640px;
            aspect-ratio: 480 / 640;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #000;
        }

        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            background-color: #111;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: 4px;
        }

        button {
            background: #222;
            color: white;
            border: 2px solid var(--accent-color);
            padding: 12px 24px;
            margin: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 200px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:active {
            background: var(--accent-color);
            transform: scale(0.95);
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .hp-bar-container {
            width: 120px;
            height: 12px;
            background: #333;
            border: 1px solid #555;
        }

        #hp-fill {
            height: 100%;
            background: var(--accent-color);
            width: 100%;
            transition: width 0.3s;
        }

        .gold-text { color: var(--gold-color); font-weight: bold; }

        /* Inventory */
        #inventory {
            position: absolute;
            bottom: 80px;
            right: 10px;
            display: flex;
            gap: 5px;
            pointer-events: auto;
        }

        .inv-slot {
            width: 40px;
            height: 40px;
            background: var(--ui-bg);
            border: 1px solid #444;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        /* Controls */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 10px;
            pointer-events: auto;
        }

        .ctrl-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            color: white;
            font-size: 24px;
        }

        #ctrl-up { grid-area: up; }
        #ctrl-down { grid-area: down; }
        #ctrl-left { grid-area: left; }
        #ctrl-right { grid-area: right; }

        /* Messages */
        #msg-log {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
            pointer-events: none;
            color: #aaa;
            font-size: 0.9rem;
        }

        .hidden { display: none !important; }

        /* Instructions */
        #how-to-play {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 3px solid var(--accent-color);
            padding: 20px;
            max-width: 90%;
            z-index: 100;
            font-size: 0.9rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud" class="hidden">
        <div class="stat-group">
            <div>LV <span id="lv-val">1</span> <span id="floor-val">B1</span></div>
            <div class="hp-bar-container"><div id="hp-fill"></div></div>
            <div id="hp-text">100 / 100</div>
        </div>
        <div class="stat-group" style="text-align: right;">
            <div class="gold-text">$ <span id="gold-val">0</span></div>
            <div>ATK: <span id="atk-val">10</span></div>
            <div>DEF: <span id="def-val">5</span></div>
        </div>
    </div>

    <div id="msg-log"></div>

    <div id="inventory" class="hidden">
        <div class="inv-slot" id="slot-0"></div>
        <div class="inv-slot" id="slot-1"></div>
        <div class="inv-slot" id="slot-2"></div>
        <div class="inv-slot" id="slot-3"></div>
    </div>

    <!-- Controls -->
    <div id="controls" class="hidden">
        <div class="ctrl-btn" id="ctrl-up">↑</div>
        <div class="ctrl-btn" id="ctrl-left">←</div>
        <div class="ctrl-btn" id="ctrl-right">→</div>
        <div class="ctrl-btn" id="ctrl-down">↓</div>
    </div>

    <!-- Title Screen -->
    <div id="title-screen" class="overlay">
        <h1>黑暗地城<br><span style="font-size: 1.2rem; color: #555;">D&D 暗影</span></h1>
        <button id="start-btn">開始冒險</button>
        <button id="load-btn">讀取進度</button>
        <button id="help-btn">如何遊玩</button>
    </div>

    <!-- Game Over Screen -->
    <div id="death-screen" class="overlay hidden">
        <h1 style="color: #666;">你已力竭而亡</h1>
        <p style="margin-bottom: 20px;">黑暗吞噬了你的靈魂...</p>
        <button id="retry-btn">重新開始</button>
        <button id="load-death-btn">讀取存檔</button>
    </div>

    <!-- Victory Screen -->
    <div id="victory-screen" class="overlay hidden">
        <h1 style="color: gold;">傳奇誕生！</h1>
        <p style="margin-bottom: 20px;">你擊敗了黑暗領主，重返光明。</p>
        <p id="final-score" style="margin-bottom: 20px;"></p>
        <button onclick="location.reload()">再玩一次</button>
    </div>
</div>

<!-- Help Modal -->
<div id="how-to-play" class="hidden">
    <h2 style="color: var(--accent-color); margin-bottom: 10px;">冒險指南</h2>
    <ul style="list-style: none;">
        <li>🛡️ <b>移動：</b>滑動畫面、點擊箭頭或使用方向鍵。</li>
        <li>⚔️ <b>戰鬥：</b>靠近敵人即自動戰鬥，注意血量。</li>
        <li>💎 <b>目標：</b>殺光層內所有怪物，出口樓梯才會出現。</li>
        <li>🧪 <b>道具：</b>點擊下方的藥水（如有）可恢復 HP。</li>
        <li>📜 <b>存檔：</b>每過一層會自動存檔。</li>
    </ul>
    <button id="close-help-btn" style="width: 100%; margin-top: 20px;">知道了</button>
</div>

<script>
/**
 * 黑暗地城 - D&D 暗影
 * 專業單檔網頁遊戲實現
 */

// --- 遊戲常數與設定 ---
const CANVAS_WIDTH = 480;
const CANVAS_HEIGHT = 640;
const TILE_SIZE = 24;
const GRID_W = 20;
const GRID_H = 15;
const VIEW_W = CANVAS_WIDTH;
const VIEW_H = 400; // 遊戲視野高度

const TILE_TYPE = {
    WALL: 0,
    FLOOR: 1,
    STAIRS: 2,
    ENTRY: 3
};

const ENTITY_TYPE = {
    PLAYER: 'player',
    GOBLIN: 'goblin',
    SKELETON: 'skeleton',
    SPIDER: 'spider',
    BOSS: 'boss',
    POTION: 'potion',
    UPGRADE: 'upgrade',
    GOLD: 'gold'
};

// --- 音效系統 (Web Audio API) ---
const AudioEngine = (() => {
    let ctx = null;

    function init() {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playTone(freq, type, duration, vol = 0.1) {
        if (!ctx) return;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration);
    }

    return {
        init,
        move: () => playTone(150, 'sine', 0.1, 0.05),
        hit: () => playTone(100 + Math.random() * 50, 'sawtooth', 0.2, 0.1),
        heal: () => playTone(440, 'sine', 0.3, 0.1),
        death: () => playTone(50, 'square', 0.5, 0.2),
        pickup: () => playTone(600, 'triangle', 0.1, 0.1),
        stairs: () => {
            playTone(300, 'sine', 0.2, 0.1);
            setTimeout(() => playTone(400, 'sine', 0.2, 0.1), 100);
            setTimeout(() => playTone(500, 'sine', 0.2, 0.1), 200);
        }
    };
})();

// --- 實體類別 ---
class Entity {
    constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type;
        this.hp = 10;
        this.maxHp = 10;
        this.atk = 2;
        this.def = 0;
        this.alive = true;
        this.color = '#fff';
    }

    draw(ctx, cameraX, cameraY) {
        const px = this.x * TILE_SIZE - cameraX;
        const py = this.y * TILE_SIZE - cameraY;
        
        // 繪製陰影
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(px + TILE_SIZE/2, py + TILE_SIZE - 2, 8, 4, 0, 0, Math.PI * 2);
        ctx.fill();

        this.renderShape(ctx, px, py);
        
        // 繪製血條 (如果是怪物)
        if (this.type !== ENTITY_TYPE.PLAYER && this.hp < this.maxHp) {
            const barW = 20;
            ctx.fillStyle = '#333';
            ctx.fillRect(px + (TILE_SIZE - barW)/2, py - 5, barW, 3);
            ctx.fillStyle = '#f00';
            ctx.fillRect(px + (TILE_SIZE - barW)/2, py - 5, barW * (this.hp / this.maxHp), 3);
        }
    }

    renderShape(ctx, px, py) {
        // 由子類別覆寫
    }
}

class Player extends Entity {
    constructor(x, y) {
        super(x, y, ENTITY_TYPE.PLAYER);
        this.hp = 100;
        this.maxHp = 100;
        this.atk = 12;
        this.def = 5;
        this.lv = 1;
        this.xp = 0;
        this.gold = 0;
        this.inventory = [];
        this.color = '#3498db'; // 藍色鎧甲
    }

    renderShape(ctx, px, py) {
        // 藍色鎧甲騎士
        ctx.fillStyle = this.color;
        ctx.fillRect(px + 4, py + 4, 16, 16); // 身體
        ctx.fillStyle = '#ecf0f1';
        ctx.fillRect(px + 8, py + 2, 8, 8); // 頭盔
        // 劍線
        ctx.strokeStyle = '#bdc3c7';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px + 20, py + 12);
        ctx.lineTo(px + 28, py + 4);
        ctx.stroke();
    }

    addXp(amount) {
        this.xp += amount;
        if (this.xp >= this.lv * 50) {
            this.levelUp();
        }
    }

    levelUp() {
        this.lv++;
        this.xp = 0;
        this.maxHp += 20;
        this.hp = this.maxHp;
        this.atk += 3;
        this.def += 2;
        game.log(`升級了！目前等級 ${this.lv}`);
    }
}

class Monster extends Entity {
    constructor(x, y, type, floor) {
        super(x, y, type);
        const scale = 1 + (floor - 1) * 0.3;
        
        if (type === ENTITY_TYPE.GOBLIN) {
            this.hp = Math.floor(20 * scale);
            this.atk = Math.floor(6 * scale);
            this.def = Math.floor(1 * scale);
            this.color = '#2ecc71';
            this.xpVal = 15;
        } else if (type === ENTITY_TYPE.SKELETON) {
            this.hp = Math.floor(30 * scale);
            this.atk = Math.floor(10 * scale);
            this.def = Math.floor(3 * scale);
            this.color = '#ecf0f1';
            this.xpVal = 25;
        } else if (type === ENTITY_TYPE.SPIDER) {
            this.hp = Math.floor(15 * scale);
            this.atk = Math.floor(12 * scale);
            this.def = Math.floor(0 * scale);
            this.color = '#9b59b6';
            this.xpVal = 20;
        } else if (type === ENTITY_TYPE.BOSS) {
            this.hp = 500;
            this.maxHp = 500;
            this.atk = 25;
            this.def = 10;
            this.color = '#8e44ad'; // 巨大紫色
            this.xpVal = 1000;
        }
        this.maxHp = this.hp;
    }

    renderShape(ctx, px, py) {
        ctx.fillStyle = this.color;
        if (this.type === ENTITY_TYPE.GOBLIN) {
            ctx.beginPath();
            ctx.arc(px + 12, py + 12, 8, 0, Math.PI * 2);
            ctx.fill();
            // 尖耳朵
            ctx.beginPath();
            ctx.moveTo(px + 6, py + 6); ctx.lineTo(px + 2, py + 2); ctx.lineTo(px + 8, py + 8);
            ctx.fill();
        } else if (this.type === ENTITY_TYPE.SKELETON) {
            ctx.fillRect(px + 6, py + 4, 12, 16);
            ctx.fillStyle = '#000';
            ctx.fillRect(px + 8, py + 8, 2, 2);
            ctx.fillRect(px + 14, py + 8, 2, 2);
        } else if (this.type === ENTITY_TYPE.SPIDER) {
            ctx.beginPath();
            ctx.arc(px + 12, py + 12, 6, 0, Math.PI * 2);
            ctx.fill();
            // 腳
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 1;
            for(let i=0; i<8; i++) {
                const ang = (i/8) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(px+12, py+12);
                ctx.lineTo(px+12 + Math.cos(ang)*10, py+12 + Math.sin(ang)*10);
                ctx.stroke();
            }
        } else if (this.type === ENTITY_TYPE.BOSS) {
            // 巨大龍形
            ctx.fillRect(px - 12, py - 12, 48, 48);
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.moveTo(px - 12, py - 12); ctx.lineTo(px + 36, py - 12); ctx.lineTo(px + 12, py - 30);
            ctx.fill();
        }
    }
}

class Item extends Entity {
    constructor(x, y, type) {
        super(x, y, type);
    }
    renderShape(ctx, px, py) {
        if (this.type === ENTITY_TYPE.POTION) {
            ctx.fillStyle = '#e74c3c';
            ctx.beginPath();
            ctx.moveTo(px+12, py+4); ctx.lineTo(px+18, py+18); ctx.lineTo(px+6, py+18);
            ctx.fill();
        } else if (this.type === ENTITY_TYPE.UPGRADE) {
            ctx.fillStyle = '#3498db';
            ctx.fillRect(px+8, py+4, 8, 16);
            ctx.fillRect(px+4, py+8, 16, 4);
        } else if (this.type === ENTITY_TYPE.GOLD) {
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.arc(px+12, py+12, 6, 0, Math.PI*2);
            ctx.fill();
        }
    }
}

// --- 遊戲核心引擎 ---
const game = {
    canvas: null,
    ctx: null,
    floor: 1,
    map: [],
    fog: [],
    entities: [],
    player: null,
    camera: { x: 0, y: 0 },
    particles: [],
    shake: 0,
    state: 'title', // title, playing, death, victory
    enemiesRemaining: 0,
    stairsVisible: false,

    init() {
        this.canvas = document.getElementById('gameCanvas');
        this.canvas.width = CANVAS_WIDTH;
        this.canvas.height = CANVAS_HEIGHT;
        this.ctx = this.canvas.getContext('2d');
        
        this.setupEventListeners();
        this.loop();
    },

    setupEventListeners() {
        // 按鈕監聽
        document.getElementById('start-btn').onclick = () => this.startNewGame();
        document.getElementById('load-btn').onclick = () => this.loadGame();
        document.getElementById('retry-btn').onclick = () => this.startNewGame();
        document.getElementById('load-death-btn').onclick = () => this.loadGame();
        document.getElementById('help-btn').onclick = () => document.getElementById('how-to-play').classList.remove('hidden');
        document.getElementById('close-help-btn').onclick = () => document.getElementById('how-to-play').classList.add('hidden');

        // 鍵盤移動
        window.onkeydown = (e) => {
            if (this.state !== 'playing') return;
            let dx = 0, dy = 0;
            if (e.key === 'ArrowUp') dy = -1;
            if (e.key === 'ArrowDown') dy = 1;
            if (e.key === 'ArrowLeft') dx = -1;
            if (e.key === 'ArrowRight') dx = 1;
            if (dx !== 0 || dy !== 0) this.tryMovePlayer(dx, dy);
        };

        // 虛擬搖桿
        const bindBtn = (id, dx, dy) => {
            document.getElementById(id).ontouchstart = (e) => { e.preventDefault(); this.tryMovePlayer(dx, dy); };
            document.getElementById(id).onmousedown = (e) => { this.tryMovePlayer(dx, dy); };
        };
        bindBtn('ctrl-up', 0, -1);
        bindBtn('ctrl-down', 0, 1);
        bindBtn('ctrl-left', -1, 0);
        bindBtn('ctrl-right', 1, 0);

        // 觸控滑動
        let touchStart = null;
        this.canvas.ontouchstart = (e) => { touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY }; };
        this.canvas.ontouchend = (e) => {
            if (!touchStart || this.state !== 'playing') return;
            const dx = e.changedTouches[0].clientX - touchStart.x;
            const dy = e.changedTouches[0].clientY - touchStart.y;
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) this.tryMovePlayer(dx > 0 ? 1 : -1, 0);
                else this.tryMovePlayer(0, dy > 0 ? 1 : -1);
            }
            touchStart = null;
        };

        // 背包點擊
        for (let i = 0; i < 4; i++) {
            document.getElementById(`slot-${i}`).onclick = () => this.useItem(i);
        }
    },

    startNewGame() {
        AudioEngine.init();
        this.floor = 1;
        this.player = new Player(0, 0);
        this.generateFloor();
        this.state = 'playing';
        this.showUI();
    },

    generateFloor() {
        this.map = Array(GRID_H).fill().map(() => Array(GRID_W).fill(TILE_TYPE.WALL));
        this.fog = Array(GRID_H).fill().map(() => Array(GRID_W).fill(0)); // 0: 未探索, 1: 可見, 2: 已探索但陰影
        this.entities = [];
        this.stairsVisible = false;

        // 隨機房間生成
        const rooms = [];
        const numRooms = 6 + Math.floor(Math.random() * 5);
        for (let i = 0; i < numRooms; i++) {
            const w = 3 + Math.floor(Math.random() * 4);
            const h = 3 + Math.floor(Math.random() * 4);
            const x = 1 + Math.floor(Math.random() * (GRID_W - w - 2));
            const y = 1 + Math.floor(Math.random() * (GRID_H - h - 2));
            
            // 挖開房間
            for (let ry = y; ry < y + h; ry++) {
                for (let rx = x; rx < x + w; rx++) {
                    this.map[ry][rx] = TILE_TYPE.FLOOR;
                }
            }
            rooms.push({ x: x + Math.floor(w / 2), y: y + Math.floor(h / 2) });
        }

        // 連接房間 (簡單走廊)
        for (let i = 0; i < rooms.length - 1; i++) {
            let cx = rooms[i].x;
            let cy = rooms[i].y;
            const tx = rooms[i + 1].x;
            const ty = rooms[i + 1].y;
            while (cx !== tx || cy !== ty) {
                if (Math.random() < 0.5) {
                    if (cx !== tx) cx += (tx > cx ? 1 : -1);
                    else if (cy !== ty) cy += (ty > cy ? 1 : -1);
                } else {
                    if (cy !== ty) cy += (ty > cy ? 1 : -1);
                    else if (cx !== tx) cx += (tx > cx ? 1 : -1);
                }
                this.map[cy][cx] = TILE_TYPE.FLOOR;
            }
        }

        // 設定玩家位置
        this.player.x = rooms[0].x;
        this.player.y = rooms[0].y;
        this.map[this.player.y][this.player.x] = TILE_TYPE.ENTRY;

        // 第5層是 Boss
        if (this.floor === 5) {
            const lastRoom = rooms[rooms.length - 1];
            const boss = new Monster(lastRoom.x, lastRoom.y, ENTITY_TYPE.BOSS, this.floor);
            this.entities.push(boss);
            this.enemiesRemaining = 1;
            this.log("最終 Boss 出現了！小心它的憤怒！");
        } else {
            // 生成怪物與寶藏
            let enemies = 0;
            const enemyCount = 4 + Math.floor(this.floor * 1.5);
            for (let i = 0; i < enemyCount; i++) {
                const pos = this.getRandomFloorPos();
                if (pos.x === this.player.x && pos.y === this.player.y) continue;
                const types = [ENTITY_TYPE.GOBLIN, ENTITY_TYPE.SKELETON, ENTITY_TYPE.SPIDER];
                const type = types[Math.floor(Math.random() * types.length)];
                this.entities.push(new Monster(pos.x, pos.y, type, this.floor));
                enemies++;
            }
            this.enemiesRemaining = enemies;

            // 生成道具
            for (let i = 0; i < 3; i++) {
                const pos = this.getRandomFloorPos();
                const type = Math.random() < 0.4 ? ENTITY_TYPE.POTION : (Math.random() < 0.3 ? ENTITY_TYPE.UPGRADE : ENTITY_TYPE.GOLD);
                this.entities.push(new Item(pos.x, pos.y, type));
            }
            
            // 放置隱藏樓梯 (原本是牆，怪物死光會變樓梯)
            const stairPos = rooms[rooms.length - 1];
            this.stairPos = stairPos;
        }

        this.updateFog();
        this.saveGameAuto();
    },

    getRandomFloorPos() {
        let x, y;
        do {
            x = Math.floor(Math.random() * GRID_W);
            y = Math.floor(Math.random() * GRID_H);
        } while (this.map[y][x] !== TILE_TYPE.FLOOR);
        return { x, y };
    },

    tryMovePlayer(dx, dy) {
        const nx = this.player.x + dx;
        const ny = this.player.y + dy;

        if (nx < 0 || nx >= GRID_W || ny < 0 || ny >= GRID_H) return;

        // 檢查牆壁
        if (this.map[ny][nx] === TILE_TYPE.WALL) return;

        // 檢查怪物 (戰鬥)
        const target = this.entities.find(e => e.x === nx && e.y === ny && e.alive);
        if (target) {
            if (target instanceof Monster) {
                this.combat(this.player, target);
                return;
            } else if (target instanceof Item) {
                this.pickUp(target);
            }
        }

        // 檢查樓梯
        if (this.map[ny][nx] === TILE_TYPE.STAIRS) {
            AudioEngine.stairs();
            this.nextFloor();
            return;
        }

        // 移動
        this.player.x = nx;
        this.player.y = ny;
        AudioEngine.move();
        this.updateFog();
        
        // 怪物 AI (簡單跟隨)
        this.updateEnemies();
    },

    updateEnemies() {
        this.entities.forEach(e => {
            if (e instanceof Monster && e.alive && e.type !== ENTITY_TYPE.BOSS) {
                if (Math.random() < 0.4) { // 怪物不是每次都動
                    const dx = Math.sign(this.player.x - e.x);
                    const dy = Math.sign(this.player.y - e.y);
                    const nx = e.x + (Math.random() < 0.5 ? dx : 0);
                    const ny = e.y + (nx === e.x ? dy : 0);
                    
                    if (this.map[ny][nx] === TILE_TYPE.FLOOR || this.map[ny][nx] === TILE_TYPE.ENTRY) {
                        if (nx === this.player.x && ny === this.player.y) {
                            this.combat(e, this.player);
                        } else if (!this.entities.some(other => other.x === nx && other.y === ny && other.alive)) {
                            e.x = nx;
                            e.y = ny;
                        }
                    }
                }
            }
        });
    },

    combat(attacker, defender) {
        AudioEngine.hit();
        this.shake = 5;
        
        const isCrit = Math.random() < 0.1;
        let damage = Math.max(1, attacker.atk + Math.floor(Math.random() * 5) - defender.def);
        if (isCrit) damage *= 2;
        
        defender.hp -= damage;
        this.spawnParticles(defender.x * TILE_SIZE + 12, defender.y * TILE_SIZE + 12, isCrit ? '#f1c40f' : '#e74c3c');

        if (defender.hp <= 0) {
            defender.alive = false;
            AudioEngine.death();
            if (defender instanceof Monster) {
                this.player.addXp(defender.xpVal);
                this.enemiesRemaining--;
                if (defender.type === ENTITY_TYPE.BOSS) {
                    this.state = 'victory';
                    this.showVictory();
                } else if (this.enemiesRemaining <= 0) {
                    this.map[this.stairPos.y][this.stairPos.x] = TILE_TYPE.STAIRS;
                    this.log("出口樓梯已開啟！");
                }
            } else if (defender instanceof Player) {
                this.state = 'death';
                this.showDeath();
            }
        }
    },

    pickUp(item) {
        AudioEngine.pickup();
        item.alive = false;
        if (item.type === ENTITY_TYPE.GOLD) {
            const amount = 10 + Math.floor(Math.random() * 20);
            this.player.gold += amount;
            this.log(`獲得了 ${amount} 金幣`);
        } else if (item.type === ENTITY_TYPE.POTION) {
            if (this.player.inventory.length < 4) {
                this.player.inventory.push('potion');
                this.updateInvUI();
                this.log("獲得生命藥水");
            } else {
                this.log("背包已滿");
            }
        } else if (item.type === ENTITY_TYPE.UPGRADE) {
            this.player.atk += 2;
            this.log("武器升級！攻擊力提升");
        }
    },

    useItem(index) {
        if (this.player.inventory[index] === 'potion') {
            AudioEngine.heal();
            this.player.hp = Math.min(this.player.maxHp, this.player.hp + 30);
            this.player.inventory.splice(index, 1);
            this.updateInvUI();
            this.log("使用了藥水，HP 恢復 30");
        }
    },

    nextFloor() {
        this.floor++;
        this.generateFloor();
        this.log(`進入第 ${this.floor} 層`);
    },

    updateFog() {
        // 簡單圓形視野
        for (let y = 0; y < GRID_H; y++) {
            for (let x = 0; x < GRID_W; x++) {
                const dist = Math.sqrt((x - this.player.x) ** 2 + (y - this.player.y) ** 2);
                if (dist < 5) this.fog[y][x] = 1;
                else if (this.fog[y][x] === 1) this.fog[y][x] = 2;
            }
        }
    },

    spawnParticles(x, y, color) {
        for (let i = 0; i < 8; i++) {
            this.particles.push({
                x, y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4,
                life: 30,
                color
            });
        }
    },

    log(msg) {
        const log = document.getElementById('msg-log');
        log.innerText = msg;
        setTimeout(() => { if (log.innerText === msg) log.innerText = ''; }, 3000);
    },

    saveGameAuto() {
        const data = {
            floor: this.floor,
            player: {
                hp: this.player.hp, maxHp: this.player.maxHp,
                atk: this.player.atk, def: this.player.def,
                lv: this.player.lv, xp: this.player.xp,
                gold: this.player.gold, inventory: this.player.inventory
            }
        };
        localStorage.setItem('dungeon_save', JSON.stringify(data));
    },

    loadGame() {
        const raw = localStorage.getItem('dungeon_save');
        if (!raw) { this.log("沒有存檔記錄"); return; }
        const data = JSON.parse(raw);
        this.floor = data.floor;
        this.player = new Player(0, 0);
        Object.assign(this.player, data.player);
        this.generateFloor();
        this.state = 'playing';
        this.showUI();
        document.getElementById('death-screen').classList.add('hidden');
        document.getElementById('title-screen').classList.add('hidden');
    },

    showUI() {
        document.getElementById('title-screen').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        document.getElementById('inventory').classList.remove('hidden');
        document.getElementById('controls').classList.remove('hidden');
        this.updateInvUI();
    },

    updateInvUI() {
        for (let i = 0; i < 4; i++) {
            const slot = document.getElementById(`slot-${i}`);
            slot.innerText = this.player.inventory[i] === 'potion' ? '🧪' : '';
        }
    },

    showDeath() {
        document.getElementById('death-screen').classList.remove('hidden');
    },

    showVictory() {
        document.getElementById('victory-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `最終等級: ${this.player.lv} | 金幣: ${this.player.gold}`;
    },

    loop() {
        this.update();
        this.draw();
        requestAnimationFrame(() => this.loop());
    },

    update() {
        if (this.state !== 'playing') return;
        
        // 更新粒子
        this.particles = this.particles.filter(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;
            return p.life > 0;
        });

        // 更新相機
        const targetX = this.player.x * TILE_SIZE - CANVAS_WIDTH / 2 + TILE_SIZE / 2;
        const targetY = this.player.y * TILE_SIZE - VIEW_H / 2 + TILE_SIZE / 2;
        this.camera.x += (targetX - this.camera.x) * 0.1;
        this.camera.y += (targetY - this.camera.y) * 0.1;

        if (this.shake > 0) this.shake--;

        // 更新 HUD
        document.getElementById('hp-fill').style.width = `${(this.player.hp / this.player.maxHp) * 100}%`;
        document.getElementById('hp-text').innerText = `${Math.ceil(this.player.hp)} / ${this.player.maxHp}`;
        document.getElementById('lv-val').innerText = this.player.lv;
        document.getElementById('floor-val').innerText = `B${this.floor}`;
        document.getElementById('gold-val').innerText = this.player.gold;
        document.getElementById('atk-val').innerText = this.player.atk;
        document.getElementById('def-val').innerText = this.player.def;
    },

    draw() {
        this.ctx.fillStyle = '#000';
        this.ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        this.ctx.save();
        if (this.shake > 0) {
            this.ctx.translate(Math.random() * this.shake - this.shake/2, Math.random() * this.shake - this.shake/2);
        }
        
        const camX = Math.floor(this.camera.x);
        const camY = Math.floor(this.camera.y);

        // 繪製地圖
        for (let y = 0; y < GRID_H; y++) {
            for (let x = 0; x < GRID_W; x++) {
                const px = x * TILE_SIZE - camX;
                const py = y * TILE_SIZE - camY;
                
                if (px < -TILE_SIZE || px > CANVAS_WIDTH || py < -TILE_SIZE || py > CANVAS_HEIGHT) continue;

                const fogState = this.fog[y][x];
                if (fogState === 0) continue;

                const tile = this.map[y][x];
                if (tile === TILE_TYPE.WALL) {
                    this.ctx.fillStyle = '#2c3e50';
                    this.ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    this.ctx.strokeStyle = '#1a252f';
                    this.ctx.strokeRect(px + 2, py + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                } else {
                    this.ctx.fillStyle = '#1c1c1c'; // 地板
                    this.ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    // 裂紋
                    this.ctx.strokeStyle = '#111';
                    this.ctx.beginPath();
                    this.ctx.moveTo(px+2, py+2); this.ctx.lineTo(px+8, py+10);
                    this.ctx.stroke();

                    if (tile === TILE_TYPE.STAIRS) {
                        this.ctx.fillStyle = '#27ae60';
                        this.ctx.fillRect(px + 4, py + 4, 16, 16);
                        // 樓梯發光
                        this.ctx.shadowBlur = 10;
                        this.ctx.shadowColor = '#27ae60';
                        this.ctx.strokeRect(px + 4, py + 4, 16, 16);
                        this.ctx.shadowBlur = 0;
                    } else if (tile === TILE_TYPE.ENTRY) {
                        this.ctx.fillStyle = '#2980b9';
                        this.ctx.fillRect(px + 6, py + 6, 12, 12);
                    }
                }

                // 霧氣遮罩
                if (fogState === 2) {
                    this.ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    this.ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                }
            }
        }

        // 繪製實體
        this.entities.forEach(e => {
            if (e.alive && this.fog[e.y][e.x] === 1) {
                e.draw(this.ctx, camX, camY);
            }
        });

        // 繪製玩家
        if (this.player && this.state === 'playing') {
            this.player.draw(this.ctx, camX, camY);
        }

        // 繪製粒子
        this.particles.forEach(p => {
            this.ctx.fillStyle = p.color;
            this.ctx.globalAlpha = p.life / 30;
            this.ctx.fillRect(p.x - camX, p.y - camY, 3, 3);
        });
        this.ctx.globalAlpha = 1;

        this.ctx.restore();
    }
};

// 啟動遊戲
game.init();

</script>
